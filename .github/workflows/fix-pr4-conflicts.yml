name: Fix PR4 known conflict files

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: "Branch to merge from"
        required: true
        default: "main"
      target_branch:
        description: "Branch to fix conflicts on"
        required: true
        default: "work"

permissions:
  contents: write

jobs:
  fix-conflicts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge base branch and auto-resolve known files
        run: |
          set +e
          git fetch origin "${{ github.event.inputs.base_branch }}"
          git merge --no-ff --no-edit "origin/${{ github.event.inputs.base_branch }}"
          MERGE_EXIT=$?
          set -e

          if [ "$MERGE_EXIT" -ne 0 ]; then
            echo "Merge reported conflicts. Resolving known files using target branch versions (ours)."

            # Resolve the recurring conflict set explicitly (only when files are present).
            conflict_candidates=(
              .github/workflows/deploy-apk-site.yml
              android/app/src/main/AndroidManifest.xml
              android/app/src/main/java/com/example/googletvlogochanger/MainActivity.kt
              android/app/src/main/res/layout/activity_main.xml
              public/admin.html
              public/index.html
              public/tv.html
              server.js
            )

            staged_any=0
            for file in "${conflict_candidates[@]}"; do
              if [ -e "$file" ] || git ls-files --error-unmatch "$file" >/dev/null 2>&1; then
                git checkout --ours -- "$file"
                git add -- "$file"
                staged_any=1
              fi
            done

            # If unmerged paths remain, fail fast with explicit file list.
            unresolved=$(git diff --name-only --diff-filter=U)
            if [ -n "$unresolved" ]; then
              echo "Unresolved merge conflicts remain:"
              echo "$unresolved"
              exit 1
            fi

            # If any conflict markers remain in text files, fail fast.
            if git grep -n "^<<<<<<<\|^=======\|^>>>>>>>" -- . ":(exclude).git"; then
              echo "Unresolved conflict markers remain."
              exit 1
            fi

            if [ "$staged_any" -eq 1 ]; then
              git commit -m "Auto-resolve known PR4 conflict files after merge"
            else
              echo "No known conflict files were present to stage."
            fi
          fi

      - name: Push changes
        run: |
          git push origin "HEAD:${{ github.event.inputs.target_branch }}"

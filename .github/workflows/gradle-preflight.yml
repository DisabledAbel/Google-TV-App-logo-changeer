name: Android Gradle Preflight

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Verify Gradle
        run: gradle --version

      - name: Preflight Android project (no APK build)
        run: gradle --no-daemon -p android help
